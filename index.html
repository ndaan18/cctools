<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC Tools</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <header class="hero">
      <div class="hero-text">
        <h1 class="site-title">CC Tools</h1>
        <p class="site-subtitle">After Effects scripts, OpenFX plugins &amp; creative coding tools</p>
      </div>
      <div class="hero-controls">
        <div id="filter-bar"></div>
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search" type="search" placeholder="Search…" autocomplete="off" />
        </div>
      </div>
    </header>

    <main>
      <div id="grid"></div>
      <p id="empty" hidden>No tools found.</p>
    </main>

  </div>

  <script src="js/tools.js"></script>
  <script src="js/squircle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
